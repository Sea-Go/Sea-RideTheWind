Name: security.rpc
ListenOn: 0.0.0.0:8081
Timeout: 60000
Etcd:
  Hosts:
  - etcd:2379
  Key: security.rpc

Telemetry:
  Name: security-rpc
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc


AdDetection:
  ApiEndpoint: "https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation"
  ApiKey: ""
  Threshold: 0.7
  Timeout: 1000
  Model: "Qwen3-max"

Log:
  ServiceName: security
  Mode: file
  Path: ../../../log/security

HtmlSanitization:
  AllowedTags:
    - "b"
    - "i"
    - "p"
    - "br"
    - "strong"
    - "em"
    - "u"
    - "s"
    - "sub"
    - "sup"
    - "blockquote"
    - "code"
    - "pre"
    - "ul"
    - "ol"
    - "li"
    - "dl"
    - "dt"
    - "dd"
    - "a"
    - "img"

AIModel:
  ModelEndpoint: "https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation"
  APIKey: ""
  Timeout: 300
  ConfidenceThreshold: 0.7

  confidenceThreshold: 0.7
max_images_per_batch: 30
default_options:
  enable_ad_detection: true
  confidence_threshold: 0.7
  enable_text_extraction: true
timeout_seconds: 30
retry_attempts: 3
logging:
  enabled: true
  level: info
metrics:
  enabled: true
  include_processing_time: true
  include_image_size: true
  include_batch_metrics: true

Cache:
  - Host: redis:6379
    Type: node
