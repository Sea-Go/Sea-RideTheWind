Name: points.rpc
ListenOn: 0.0.0.0:8082

Postgres:
  Host: "postgres"
  Port: "5432"
  User: "admin"
  Password: "${POSTGRES_PASSWORD}"
  DBName: "first_db"
  Mode: "disable"

Etcd:
  Hosts:
  - etcd:2379
  Key: points.rpc

RetryDqConf:
  Beanstalks:
    - Endpoint: beanstalkd1:11300
      Tube: points_retry_tube
    - Endpoint: beanstalkd2:11300
      Tube: points_retry_tube2
  Redis:
    Host: redis:6379
    Type: node

DqConf:
  Beanstalks:
    - Endpoint: beanstalkd1:11300
      Tube: points_retry_tube
    - Endpoint: beanstalkd2:11300
      Tube: points_retry_tube2
  Redis:
    Host: redis:6379
    Type: node

KqPusherConf:
  Brokers:
    - kafka:9092
  Topic: points_topic

KqConsumerConf:
  Name: kqConsumer
  Brokers:
    - kafka:9092
  Group: kqConsumer
  Topic: points_topic
  Offset: first
  Consumers: 8
  Processors: 8

Log:
  ServiceName: points-rpc
  Mode: file
  Path: ../../../log/points

Telemetry:
  Name: points-rpc
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc

DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 16061
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: true
