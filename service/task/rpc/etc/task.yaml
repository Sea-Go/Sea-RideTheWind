Name: task.rpc
ListenOn: 0.0.0.0:9005
Etcd:
  Hosts:
  - etcd:2379
  Key: task.rpc

Telemetry:
  Name: task-rpc
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc

Kafka:
  Brokers:
    - kafka:9092
  InTopic: task.logs.raw
  RawUserTopic: task.logs.raw.User
  RawArticleTopic: task.logs.raw.Article
  OutUserTopic: task.logs.filtered.User
  OutArticleTopic: task.logs.filtered.Article

  GroupKafkaRaw: task.rpc.consumer31
  GroupKafkaFilter: task.rpc.consumer101

  GroupGoKa: task.rpc.consumer41

  GroupGoKaUser: task.rpc.consumer61
  GroupGoKaArticle: task.rpc.consumer71

  GroupFilterUser: task.rpc.consumer81
  GroupFilterArticle: task.rpc.consumer91
  
  Offset: latest         # latest / earliest
  Consumers: 8           # 并发消费协程数
  Processors: 8

LikeRedis:
  Addr: redis:6379
  Pass: ""
  DB: 0
  DialTimeoutMs: 500
  ReadTimeoutMs: 1000
  WriteTimeoutMs: 1000
  PoolSize: 200
  MinIdleConns: 20
  consumerName: task.reward.test

Postgres:
  Dsn: "host=${POSTGRES_ADDR} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} port=${POSTGRES_PORT} sslmode=disable TimeZone=Asia/Shanghai"
  MaxOpenConns: 50
  MaxIdleConns: 50
  ConnMaxLifetimeMinutes: 30
